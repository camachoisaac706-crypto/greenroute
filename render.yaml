# Render Blueprint — deploys GreenRoute as a single web service.
# In Render: New → Blueprint → pick your repo → Apply.
services:
  - type: web
    name: greenroute
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
